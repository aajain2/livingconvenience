<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta name="theme-color" content="#F4EEE6"/>
  <title>Contact — Living Convenience</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg"/>
  <style>
    @font-face {
      font-family: MagicUIPro;
      src: url(assets/magicui.woff2) format("woff2");
      font-display: swap; font-weight: 400; font-style: normal;
    }
    @font-face {
      font-family: Ninna;
      src: url(assets/ninna-trials/Ninna-Regular.otf) format("opentype");
      font-display: swap; font-weight: 400; font-style: normal;
    }

    :root {
      --font-magic-ui: "MagicUIPro", sans-serif;
      --font-ninna: "Ninna", serif;
      --color-background: #F4EEE6;
      --color-beige: #f7f1ea;
      --color-brown: #2b1b1b;
      --color-text-dark: #2e1a1b;
      --color-light-grey: #fcfbf7;
      --color-green-acid: #42e65c;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 10px; -webkit-font-smoothing: antialiased; }
    body { font-family: var(--font-magic-ui); background: var(--color-background); color: var(--color-text-dark); }
    a { text-decoration: none; color: inherit; }
    h1, h2, h3 { text-transform: none; }

    /* Contact page */
    .contact-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14rem 2rem 8rem;
    }
    .contact-content {
      width: 100%;
      max-width: 48rem;
    }
    .contact-heading {
      font-family: var(--font-ninna);
      font-size: 3rem;
      font-weight: 400;
      letter-spacing: -0.01em;
      line-height: 1.3;
      margin-bottom: 1.2rem;
      color: #313131;
      text-align: center;
      text-transform: uppercase;
    }
    .contact-sub {
      font-family: var(--font-magic-ui);
      font-size: 1.5rem;
      line-height: 1.6;
      color: var(--color-text-dark);
      opacity: 0.6;
      text-align: center;
      margin-bottom: 4.5rem;
    }
    .form-group {
      margin-bottom: 2.4rem;
    }
    .form-label {
      display: block;
      font-family: var(--font-magic-ui);
      font-size: 1.15rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      opacity: 0.45;
      margin-bottom: 0.8rem;
    }
    .form-input,
    .form-textarea {
      width: 100%;
      font-family: var(--font-magic-ui);
      font-size: 1.5rem;
      color: var(--color-text-dark);
      background: rgba(244, 238, 230, 0.65);
      border: none;
      border-bottom: 1px solid rgba(43, 27, 27, 0.15);
      padding: 1rem 0;
      outline: none;
      transition: border-color 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      letter-spacing: -0.002em;
    }
    .form-input::placeholder,
    .form-textarea::placeholder {
      color: rgba(43, 27, 27, 0.25);
    }
    .form-input:focus,
    .form-textarea:focus {
      border-bottom-color: var(--color-text-dark);
    }
    .form-textarea {
      resize: none;
      min-height: 12rem;
      line-height: 1.6;
    }
    .form-submit {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 1.4rem 3.6rem;
      border-radius: 10rem;
      background: var(--color-brown);
      color: var(--color-beige);
      font-family: var(--font-magic-ui);
      font-size: 1.4rem;
      letter-spacing: 0.01em;
      border: none;
      cursor: pointer;
      transition: opacity 0.3s, transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      margin-top: 1.2rem;
    }
    .form-submit:hover {
      opacity: 0.85;
      transform: scale(0.98);
    }
    .contact-direct {
      margin-top: 5rem;
      padding-top: 3.5rem;
      border-top: 1px solid rgba(43, 27, 27, 0.08);
      text-align: center;
    }
    .contact-direct-label {
      font-family: var(--font-magic-ui);
      font-size: 1.15rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      opacity: 0.4;
      margin-bottom: 1rem;
    }
    .contact-direct a {
      font-family: var(--font-magic-ui);
      font-size: 1.5rem;
      color: var(--color-text-dark);
      transition: opacity 0.2s;
    }
    .contact-direct a:hover { opacity: 0.6; }

    /* Fade in */
    .fade-in {
      opacity: 0; transform: translateY(20px);
      animation: fadeUp 0.8s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    .fade-in-d1 { animation-delay: 0.1s; }
    .fade-in-d2 { animation-delay: 0.2s; }
    .fade-in-d3 { animation-delay: 0.3s; }
    .fade-in-d4 { animation-delay: 0.4s; }
    .fade-in-d5 { animation-delay: 0.5s; }
    .fade-in-d6 { animation-delay: 0.6s; }
    .fade-in-d7 { animation-delay: 0.7s; }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 767px) {
      .contact-page { padding: 12rem 2rem 6rem; }
      .contact-heading { font-size: 2.4rem; }
      .contact-content { max-width: 100%; }
    }

  </style>
</head>
<body>
  <script src="navbar.js"></script>

  <!-- CONTACT CONTENT -->
  <main class="contact-page">
    <div class="contact-content">
      <h1 class="contact-heading fade-in fade-in-d1">Get in Touch</h1>
      <p class="contact-sub fade-in fade-in-d2">Tell us about your project and we'll get back to you within 24 hours.</p>

      <form onsubmit="return false;">
        <div class="form-group fade-in fade-in-d3">
          <label class="form-label">Name</label>
          <input class="form-input" type="text" placeholder="Full name"/>
        </div>
        <div class="form-group fade-in fade-in-d4">
          <label class="form-label">Email</label>
          <input class="form-input" type="email" placeholder="you@email.com"/>
        </div>
        <div class="form-group fade-in fade-in-d5">
          <label class="form-label">Project type</label>
          <input class="form-input" type="text" placeholder="New build, retrofit, consultation..."/>
        </div>
        <div class="form-group fade-in fade-in-d6">
          <label class="form-label">Message</label>
          <textarea class="form-textarea" placeholder="Tell us about your space and what you're looking for."></textarea>
        </div>
        <div class="fade-in fade-in-d7">
          <button class="form-submit" type="submit">Send Inquiry</button>
        </div>
      </form>

      <div class="contact-direct fade-in fade-in-d7">
        <p class="contact-direct-label">Or reach us directly</p>
        <a href="mailto:info@livingconvenience.com">info@livingconvenience.com</a>
      </div>
    </div>
  </main>

  <script src="footer.js"></script>

</body>
</html>
