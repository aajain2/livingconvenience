<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta name="theme-color" content="#F4EEE6"/>
  <title>Projects — Living Convenience</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg"/>
  <style>
    @font-face { font-family: MagicUIPro; src: url(assets/magicui.woff2) format("woff2"); font-display: swap; font-weight: 400; font-style: normal; }
    @font-face { font-family: Ninna; src: url(assets/ninna-trials/Ninna-Regular.otf) format("opentype"); font-display: swap; font-weight: 400; font-style: normal; }
    @font-face { font-family: Ninna; src: url(assets/ninna-trials/Ninna-Italic.otf) format("opentype"); font-display: swap; font-weight: 400; font-style: italic; }

    :root {
      --font-magic-ui: "MagicUIPro", sans-serif;
      --font-ninna: "Ninna", serif;
      --color-background: #F4EEE6;
      --color-beige: #f7f1ea;
      --color-brown: #2b1b1b;
      --color-text-dark: #2e1a1b;
      --color-light-grey: #fcfbf7;
      --color-green-acid: #42e65c;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 10px; -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }
    body { font-family: var(--font-magic-ui); background: var(--color-background); color: var(--color-text-dark); overflow-x: hidden; }
    a { text-decoration: none; color: inherit; }
    img { display: block; max-width: 100%; }

    /* ========== Page header ========== */
    .proj-header {
      padding: 16rem 3.5rem 6rem;
    }
    .proj-heading {
      font-family: var(--font-ninna);
      font-weight: 400;
      font-size: clamp(3rem, 5vw, 6rem);
      line-height: 1.1;
      letter-spacing: -0.01em;
      text-transform: uppercase;
      color: #313131;
    }

    /* ========== Gallery ========== */
    .proj-gallery {
      padding: 0 4.8rem 8rem;
      display: flex;
      flex-direction: column;
      gap: 6rem;
    }

    /* Row 1: Three arch-topped columns */
    .proj-row-arches {
      display: grid;
      grid-template-columns: 1fr 1.2fr 1fr;
      gap: 3.2rem;
      height: 70vh;
    }
    .proj-arch {
      overflow: hidden;
      border-top-left-radius: 50%;
      border-top-right-radius: 50%;
      border-bottom-left-radius: 0;
      border-bottom-right-radius: 0;
      position: relative;
    }
    .proj-arch img {
      width: 100%; height: 100%;
      object-fit: cover;
    }

    /* Row 2: Single wide panoramic */
    .proj-row-pano {
      width: 100%;
      height: 50vh;
      border-radius: 0;
      overflow: hidden;
      position: relative;
    }
    .proj-row-pano img {
      width: 100%; height: 100%;
      object-fit: cover;
    }

    /* Row 3: Asymmetric two-col */
    .proj-row-asym {
      display: grid;
      grid-template-columns: 1fr 1.8fr;
      gap: 3.2rem;
      height: 60vh;
    }
    .proj-tall {
      border-radius: 0;
      overflow: hidden;
      position: relative;
    }
    .proj-tall img {
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .proj-wide {
      border-radius: 0;
      overflow: hidden;
      position: relative;
    }
    .proj-wide img {
      width: 100%; height: 100%;
      object-fit: cover;
    }

    /* Row 4: Two equal blocks */
    .proj-row-duo {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3.2rem;
      height: 55vh;
    }
    .proj-square {
      border-radius: 0;
      overflow: hidden;
      position: relative;
    }
    .proj-square img {
      width: 100%; height: 100%;
      object-fit: cover;
    }

    /* Row 5: Single arch centered */
    .proj-row-single-arch {
      display: flex;
      justify-content: center;
      height: 75vh;
    }
    .proj-single-arch {
      width: 50%;
      border-top-left-radius: 50%;
      border-top-right-radius: 50%;
      border-bottom-left-radius: 0;
      border-bottom-right-radius: 0;
      overflow: hidden;
      position: relative;
    }
    .proj-single-arch img {
      width: 100%; height: 100%;
      object-fit: cover;
    }

    /* Row 6: Three equal columns */
    .proj-row-thirds {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 3.2rem;
      height: 45vh;
    }
    .proj-third {
      border-radius: 0;
      overflow: hidden;
      position: relative;
    }
    .proj-third img {
      width: 100%; height: 100%;
      object-fit: cover;
    }

    /* Shared overlay label */
    .proj-label {
      position: absolute;
      bottom: 1.6rem; left: 50%;
      transform: translateX(-50%);
      font-family: var(--font-magic-ui);
      font-size: 1.2rem; letter-spacing: 0.02em;
      padding: 0.5rem 1.4rem; border-radius: 999px;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: #fff; white-space: nowrap;
      z-index: 2;
    }

    /* Hover effects */
    .proj-gallery a {
      display: block;
      transition: transform 0.5s cubic-bezier(0.19,1,0.22,1);
    }
    .proj-gallery a:hover { transform: scale(0.985); }
    .proj-gallery a img {
      transition: transform 0.6s cubic-bezier(0.19,1,0.22,1);
    }
    .proj-gallery a:hover img { transform: scale(1.05); }

    /* Scroll reveal */
    .reveal {
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 1.2s cubic-bezier(0.16, 1, 0.3, 1),
                  transform 1.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    /* Responsive */
    @media (max-width: 767px) {
      .proj-header { padding: 12rem 2rem 4rem; }
      .proj-row-arches {
        grid-template-columns: 1fr;
        height: auto;
      }
      .proj-arch { height: 50vh; }
      .proj-row-arches .proj-arch:nth-child(1),
      .proj-row-arches .proj-arch:nth-child(3) {
        display: none;
      }
      .proj-row-asym {
        grid-template-columns: 1fr;
        height: auto;
      }
      .proj-tall, .proj-wide { height: 45vh; }
      .proj-row-duo {
        grid-template-columns: 1fr;
        height: auto;
      }
      .proj-square { height: 45vh; }
      .proj-single-arch { width: 80%; }
      .proj-row-thirds {
        grid-template-columns: 1fr;
        height: auto;
      }
      .proj-third { height: 40vh; }
    }
  </style>
</head>
<body>
  <script src="navbar.js"></script>

  <main>
    <div class="proj-header">
      <h1 class="proj-heading reveal">Selected Projects</h1>
    </div>

    <section class="proj-gallery">

      <!-- Row 1: Three arches -->
      <div class="proj-row-arches">
        <a class="proj-arch reveal" href="#">
          <img src="assets/project-1.jpg" alt="Pacific Heights"/>
          <span class="proj-label">Pacific Heights</span>
        </a>
        <a class="proj-arch reveal" href="#">
          <img src="assets/project-3.jpg" alt="Atherton Estate"/>
          <span class="proj-label">Atherton Estate</span>
        </a>
        <a class="proj-arch reveal" href="#">
          <img src="assets/project-2.jpg" alt="Napa Valley"/>
          <span class="proj-label">Napa Valley</span>
        </a>
      </div>

      <!-- Row 2: Wide panoramic -->
      <a class="proj-row-pano reveal" href="#">
        <img src="assets/project-2.jpg" alt="The Courtyard Residence" style="object-position: center 30%"/>
        <span class="proj-label">The Courtyard Residence</span>
      </a>

      <!-- Row 3: Asymmetric split -->
      <div class="proj-row-asym">
        <a class="proj-tall reveal" href="#">
          <img src="assets/project-3.jpg" alt="Woodside"/>
          <span class="proj-label">Woodside</span>
        </a>
        <a class="proj-wide reveal" href="#">
          <img src="assets/project-1.jpg" alt="Peninsula Villa" style="object-position: center 60%"/>
          <span class="proj-label">Peninsula Villa</span>
        </a>
      </div>

      <!-- Row 4: Two equal blocks -->
      <div class="proj-row-duo">
        <a class="proj-square reveal" href="#">
          <img src="assets/project-1.jpg" alt="Presidio Heights" style="object-position: right center"/>
          <span class="proj-label">Presidio Heights</span>
        </a>
        <a class="proj-square reveal" href="#">
          <img src="assets/project-3.jpg" alt="Hillsborough" style="object-position: left center"/>
          <span class="proj-label">Hillsborough</span>
        </a>
      </div>

      <!-- Row 5: Single centered arch -->
      <div class="proj-row-single-arch">
        <a class="proj-single-arch reveal" href="#">
          <img src="assets/project-2.jpg" alt="East Bay Retreat" style="object-position: center 40%"/>
          <span class="proj-label">East Bay Retreat</span>
        </a>
      </div>

      <!-- Row 6: Three equal columns -->
      <div class="proj-row-thirds">
        <a class="proj-third reveal" href="#">
          <img src="assets/project-3.jpg" alt="Sausalito" style="object-position: center 20%"/>
          <span class="proj-label">Sausalito</span>
        </a>
        <a class="proj-third reveal" href="#">
          <img src="assets/project-1.jpg" alt="Portola Valley" style="object-position: center 80%"/>
          <span class="proj-label">Portola Valley</span>
        </a>
        <a class="proj-third reveal" href="#">
          <img src="assets/project-2.jpg" alt="Los Altos" style="object-position: right center"/>
          <span class="proj-label">Los Altos</span>
        </a>
      </div>

    </section>
  </main>

  <script src="footer.js"></script>

  <script>
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
  </script>
</body>
</html>
